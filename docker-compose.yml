services:
  jimeng-api:
    image: jimeng-haochi:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jimeng-haochi
    restart: unless-stopped
    ports:
      - "5100:5100"
    environment:
      SERVER_PORT: 5100
      HAOCHI_STATE_PATH: /app/data/haochi/state.json
      HAOCHI_LOGIN_PROVIDER: dreamina
      HAOCHI_LOGIN_HEADLESS: 1
      HAOCHI_ADMIN_USERNAME: admin
      HAOCHI_ADMIN_PASSWORD: ChangeMe123!
      HAOCHI_ACCOUNT_SECRET: change-this-secret-at-least-8
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./tmp:/app/tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5100/ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
